<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adler Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Adler Settings</h1>
      <p class="subtitle">Configure your API keys to get started.</p>
    </header>

    <section class="section">
      <h2>API Keys</h2>
      <p class="section-desc">Enter your API keys below. Keys are stored locally and never sent anywhere except their respective APIs.</p>

      <div class="field">
        <label for="key-openai">OpenAI</label>
        <div class="key-input">
          <input type="password" id="key-openai" placeholder="sk-..." autocomplete="off">
          <button class="toggle-vis" data-target="key-openai" title="Show/hide">
            <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="key-anthropic">Anthropic (Claude)</label>
        <div class="key-input">
          <input type="password" id="key-anthropic" placeholder="sk-ant-..." autocomplete="off">
          <button class="toggle-vis" data-target="key-anthropic" title="Show/hide">
            <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="key-gemini">Google (Gemini)</label>
        <div class="key-input">
          <input type="password" id="key-gemini" placeholder="AI..." autocomplete="off">
          <button class="toggle-vis" data-target="key-gemini" title="Show/hide">
            <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Preferences</h2>

      <div class="field">
        <label for="pref-provider">Default Provider</label>
        <select id="pref-provider">
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="gemini">Google (Gemini)</option>
        </select>
      </div>
    </section>

    <div class="actions">
      <button id="btn-save" class="btn-primary">Save Settings</button>
      <span id="save-status" class="save-status"></span>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
